services:
  redis:
    image: redis:latest
    container_name: redis-for-learning
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  mongodb:
    image: mongo:latest
    container_name: mongodb-for-learning
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: mongo_learning_db
    volumes:
      - mongo-data:/data/db

volumes:
  redis-data:
  mongo-data:
